<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexora - Download Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c23",
                        "surface-container-highest": "#e0e2ec",
                        "inverse-primary": "#adc7ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#006573",
                        "tertiary-container": "#24883f",
                        "on-secondary-fixed-variant": "#004e59",
                        "outline": "#727785",
                        "on-tertiary-container": "#000601",
                        "surface-dim": "#d8d9e3",
                        "surface-container-low": "#f2f3fd",
                        "tertiary-fixed-dim": "#7adb87",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1a73e8",
                        "on-surface-variant": "#414754",
                        "primary-fixed-dim": "#adc7ff",
                        "on-tertiary-fixed-variant": "#00531f",
                        "surface-tint": "#005bc0",
                        "on-secondary": "#ffffff",
                        "background": "#f9f9ff",
                        "tertiary": "#006d2b",
                        "surface-variant": "#e0e2ec",
                        "surface-container-high": "#e6e8f2",
                        "on-background": "#191c23",
                        "on-primary-container": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "primary-fixed": "#d8e2ff",
                        "surface-container": "#ecedf7",
                        "outline-variant": "#c1c6d6",
                        "inverse-surface": "#2d3038",
                        "on-primary-fixed-variant": "#004493",
                        "primary": "#005bbf",
                        "inverse-on-surface": "#eff0fa",
                        "secondary-fixed-dim": "#44d8f1",
                        "on-secondary-fixed": "#001f25",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#a1efff",
                        "tertiary-fixed": "#96f8a1",
                        "on-primary-fixed": "#001a41",
                        "secondary": "#006876",
                        "secondary-container": "#58e6ff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#002108"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "card": "24px",
                        "input": "16px",
                        "chip": "12px",
                        "sheet": "32px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "touch-target": "48px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.04);
        }
        
        .success-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(36, 136, 63, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(36, 136, 63, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(36, 136, 63, 0); }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center font-sans antialiased">
<!-- Main Content Canvas (Transactional intent, navigation suppressed) -->
<main class="w-full max-w-[1440px] px-margin-mobile md:px-margin-desktop flex-1 flex items-center justify-center relative">
<!-- Abstract Background Decoration -->
<div class="absolute inset-0 overflow-hidden pointer-events-none flex justify-center items-center opacity-40">
<div class="w-[600px] h-[600px] bg-tertiary-container rounded-full blur-[100px] absolute mix-blend-multiply opacity-20"></div>
<div class="w-[400px] h-[400px] bg-primary-container rounded-full blur-[80px] absolute ml-[200px] mt-[150px] mix-blend-multiply opacity-10"></div>
</div>
<!-- Success Dialog Card -->
<section class="glass-card w-full max-w-md rounded-card p-8 md:p-10 flex flex-col items-center text-center relative z-10 animate-fade-in-up">
<!-- Success Icon -->
<div class="w-24 h-24 rounded-full bg-tertiary-container flex items-center justify-center mb-8 success-pulse">
<span class="material-symbols-outlined text-on-tertiary" style="font-size: 48px; font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
</div>
<!-- Title -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-3">
                Download Complete
            </h1>
<!-- Details -->
<p class="font-body-lg text-body-lg text-on-surface-variant mb-10 max-w-[280px]">
                "Ultimate 4K Nature Relaxation" saved to Gallery.
            </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<button class="w-full h-touch-target rounded-full bg-primary text-on-primary font-title-md text-title-md flex items-center justify-center hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg hover:shadow-[0px_8px_30px_rgba(0,0,0,0.08)]">
<span class="material-symbols-outlined mr-2" style="font-size: 20px;">play_arrow</span>
                    Open File
                </button>
<button class="w-full h-touch-target rounded-full bg-surface-container-high text-on-surface font-title-md text-title-md flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all duration-200">
                    Back to Home
                </button>
</div>
</section>
</main>
<script>
        // Simple entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
