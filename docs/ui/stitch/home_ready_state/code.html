<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexora - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#191c23",
                      "surface-container-highest": "#e0e2ec",
                      "inverse-primary": "#adc7ff",
                      "on-tertiary": "#ffffff",
                      "on-secondary-container": "#006573",
                      "tertiary-container": "#24883f",
                      "on-secondary-fixed-variant": "#004e59",
                      "outline": "#727785",
                      "on-tertiary-container": "#000601",
                      "surface-dim": "#d8d9e3",
                      "surface-container-low": "#f2f3fd",
                      "tertiary-fixed-dim": "#7adb87",
                      "surface-container-lowest": "#ffffff",
                      "primary-container": "#1a73e8",
                      "on-surface-variant": "#414754",
                      "primary-fixed-dim": "#adc7ff",
                      "on-tertiary-fixed-variant": "#00531f",
                      "surface-tint": "#005bc0",
                      "on-secondary": "#ffffff",
                      "background": "#f9f9ff",
                      "tertiary": "#006d2b",
                      "surface-variant": "#e0e2ec",
                      "surface-container-high": "#e6e8f2",
                      "on-background": "#191c23",
                      "on-primary-container": "#ffffff",
                      "surface-bright": "#f9f9ff",
                      "surface": "#f9f9ff",
                      "primary-fixed": "#d8e2ff",
                      "surface-container": "#ecedf7",
                      "outline-variant": "#c1c6d6",
                      "inverse-surface": "#2d3038",
                      "on-primary-fixed-variant": "#004493",
                      "primary": "#005bbf",
                      "inverse-on-surface": "#eff0fa",
                      "secondary-fixed-dim": "#44d8f1",
                      "on-secondary-fixed": "#001f25",
                      "error-container": "#ffdad6",
                      "secondary-fixed": "#a1efff",
                      "tertiary-fixed": "#96f8a1",
                      "on-primary-fixed": "#001a41",
                      "secondary": "#006876",
                      "secondary-container": "#58e6ff",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed": "#002108"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px",
                      "2xl": "1.5rem",
                      "3xl": "2rem"
              },
              "spacing": {
                      "margin-mobile": "20px",
                      "gutter": "16px",
                      "margin-desktop": "40px",
                      "base": "8px",
                      "touch-target": "48px"
              },
              "fontFamily": {
                      "title-md": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "display-lg": ["Inter"]
              },
              "fontSize": {
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            }
          }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background dark:bg-background z-40 transition-shadow duration-200" id="top-app-bar">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop py-4 max-w-[1440px] mx-auto">
<div class="flex items-center gap-2 hover:opacity-80 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary text-3xl active:scale-95 transition-transform duration-200" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary dark:text-inverse-primary tracking-tight">Nexora</span>
</div>
<!-- Desktop Nav (Hidden on Mobile) -->
<nav class="hidden md:flex items-center gap-8">
<a class="text-primary dark:text-inverse-primary font-title-md text-title-md hover:opacity-80 transition-opacity" href="#">Home</a>
<a class="text-on-surface-variant dark:text-outline-variant font-title-md text-title-md hover:opacity-80 transition-opacity" href="#">Downloads</a>
<a class="text-on-surface-variant dark:text-outline-variant font-title-md text-title-md hover:opacity-80 transition-opacity" href="#">History</a>
<a class="text-on-surface-variant dark:text-outline-variant font-title-md text-title-md hover:opacity-80 transition-opacity" href="#">Settings</a>
</nav>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col justify-end md:justify-center items-center px-margin-mobile md:px-margin-desktop w-full max-w-[1440px] mx-auto pb-[10vh] md:pb-0">
<!-- Empty State Graphics / Branding Area -->
<div class="flex flex-col items-center justify-center flex-grow w-full max-w-md opacity-80 md:mb-12">
<div class="w-32 h-32 md:w-48 md:h-48 rounded-3xl bg-surface-container-low shadow-[0px_8px_30px_rgba(0,0,0,0.08)] flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined text-6xl md:text-8xl" style="font-variation-settings: 'FILL' 0;">bolt</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center mb-2">Ready to fetch.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center max-w-[280px]">Paste a supported URL to begin downloading high-quality media.</p>
</div>
<!-- Input Area (Lower Third for Ergonomics) -->
<div class="w-full max-w-lg mt-auto md:mt-0 flex flex-col gap-base bg-surface-container-lowest p-6 rounded-[32px] shadow-[0px_4px_20px_rgba(0,0,0,0.04)] ring-1 ring-outline-variant/20">
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">link</span>
</div>
<input class="w-full h-14 pl-12 pr-16 rounded-[16px] bg-[#F1F3F4] border-none focus:ring-2 focus:ring-primary focus:bg-white text-on-surface font-body-lg text-body-lg placeholder:text-outline-variant transition-all outline-none" placeholder="Paste media URL here..." type="url"/>
<button aria-label="Paste from clipboard" class="absolute inset-y-0 right-2 flex items-center px-2 text-primary hover:bg-surface-container-low rounded-lg transition-colors group">
<span class="material-symbols-outlined text-xl group-active:scale-95 transition-transform">content_paste</span>
</button>
</div>
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-title-md text-title-md flex items-center justify-center gap-2 hover:bg-surface-tint shadow-[0px_4px_20px_rgba(0,0,0,0.04)] hover:shadow-[0px_8px_30px_rgba(0,0,0,0.08)] active:scale-[0.98] transition-all duration-200 mt-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">download</span>
                Fetch Media
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center pt-2 pb-6 px-4 bg-surface dark:bg-inverse-surface shadow-[0px_-4px_20px_rgba(0,0,0,0.04)] rounded-t-3xl z-50">
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-container text-on-secondary-container dark:text-secondary-container rounded-full px-5 py-1 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors rounded-full active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">download_for_offline</span>
<span class="font-label-md text-label-md">Downloads</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors rounded-full active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label-md text-label-md">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors rounded-full active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</a>
</nav>
<script>
        // Simple top bar scroll effect for elevation
        window.addEventListener('scroll', () => {
            const topBar = document.getElementById('top-app-bar');
            if (window.scrollY > 10) {
                topBar.classList.add('shadow-[0px_4px_20px_rgba(0,0,0,0.04)]');
            } else {
                topBar.classList.remove('shadow-[0px_4px_20px_rgba(0,0,0,0.04)]');
            }
        });
    </script>
</body></html>
